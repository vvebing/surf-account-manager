name: Release VS Code Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to release
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || (github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Determine release type
        id: release_type
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_BUMP: ${{ inputs.bump }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { execSync } = require('child_process');

          const message = execSync('git log -1 --pretty=%B', { encoding: 'utf8' }).trim();
          const explicit = message.match(/\[release:(major|minor|patch)\]/i);
          const workflowBump = process.env.WORKFLOW_BUMP;
          let bump = null;

          if (process.env.EVENT_NAME === 'workflow_dispatch' && workflowBump && workflowBump !== 'auto') {
            bump = workflowBump;
          } else if (explicit) {
            bump = explicit[1].toLowerCase();
          } else if (/BREAKING CHANGE/i.test(message) || /^[a-z]+(?:\([^)]+\))?!:/i.test(message)) {
            bump = 'major';
          } else if (/^feat(?:\([^)]+\))?:/i.test(message)) {
            bump = 'minor';
          } else if (/^(fix|perf)(?:\([^)]+\))?:/i.test(message)) {
            bump = 'patch';
          }

          const output = process.env.GITHUB_OUTPUT;
          if (!bump) {
            fs.appendFileSync(output, 'should_release=false\n');
            fs.appendFileSync(output, 'bump=none\n');
            process.exit(0);
          }

          fs.appendFileSync(output, 'should_release=true\n');
          fs.appendFileSync(output, `bump=${bump}\n`);
          NODE

      - name: Skip release
        if: steps.release_type.outputs.should_release != 'true'
        run: echo "Commit message does not request a release."

      - name: Install dependencies
        if: steps.release_type.outputs.should_release == 'true'
        run: npm ci

      - name: Validate
        if: steps.release_type.outputs.should_release == 'true'
        run: |
          npm run compile
          npm run lint

      - name: Bump version
        if: steps.release_type.outputs.should_release == 'true'
        id: version
        run: |
          npm version "${{ steps.release_type.outputs.bump }}" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "vsix=surf-account-manager-${VERSION}.vsix" >> "$GITHUB_OUTPUT"

      - name: Package extension
        if: steps.release_type.outputs.should_release == 'true'
        run: npm run package -- --out "${{ steps.version.outputs.vsix }}"

      - name: Commit version and tag
        if: steps.release_type.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip release]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Create GitHub Release
        if: steps.release_type.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            "${{ steps.version.outputs.vsix }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "Automated release for v${{ steps.version.outputs.version }}."
